# ──────────────────────────────────────────────
# LiveKit Server Configuration (Development)
# ──────────────────────────────────────────────

port: 7880
rtc:
  # node_ip: 100.110.109.26
  port_range_start: 50000
  port_range_end: 50060
  tcp_port: 7881
  use_external_ip: true

redis:
  address: redis:6379

keys:
  devkey: devsecretdevsecretdevsecretdevsecret

room:
  empty_timeout: 300  # 5 minutos
  max_participants: 50

webhook:
  urls:
    - http://host.docker.internal:3000/api/webhooks/livekit
  api_key: devkey

logging:
  level: info
