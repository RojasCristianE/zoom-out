# ──────────────────────────────────────────────
# LiveKit Server Configuration (Development)
# ──────────────────────────────────────────────

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50060
  use_external_ip: false

redis:
  address: redis:6379

keys:
  devkey: devsecretdevsecretdevsecretdevsecret

room:
  empty_timeout: 300  # 5 minutos
  max_participants: 50

webhook:
  urls:
    - http://host.docker.internal:3001/api/webhooks/livekit
  api_key: devkey

logging:
  level: info
